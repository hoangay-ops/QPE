function addCacheBuster(url){
  return url + (url.indexOf("?") === -1 ? "?" : "&") + "_=" + Date.now();
}

function parseCSV(text){
  var rows=[], row=[], cell="", inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i], n=text[i+1];
    if(c==='"'&&inQ&&n==='"'){cell+='"';i++;}
    else if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){row.push(cell);cell="";}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(cell||row.length){row.push(cell);rows.push(row);row=[];cell="";}
      if(c==='\r'&&n==='\n')i++;
    }
    else cell+=c;
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}

function normHeader(h){
  return String(h||"").toLowerCase().replace(/[\r\n]+/g," ").replace(/\s+/g," ").trim();
}

function findHeaderRow(rows){
  for(var i=0;i<Math.min(5,rows.length);i++){
    var normed = rows[i].map(normHeader);
    var hasId = normed.indexOf("id") !== -1;
    var hasName = normed.indexOf("initiative name") !== -1 || normed.indexOf("name") !== -1;
    if(hasId && hasName) return i;
  }
  return 0;
}

function makeRowAccessor(headerRow){
  var normed = headerRow.map(normHeader);
  return function(row){
    for(var k=1;k<arguments.length;k++){
      var key = normHeader(arguments[k]);
      var idx = normed.indexOf(key);
      if(idx !== -1 && row[idx] != null && String(row[idx]).trim() !== ""){
        return String(row[idx]).trim();
      }
    }
    return "";
  };
}

function parseRank(v){
  if(!v)return null;
  var s = String(v).trim().toLowerCase();
  if(s === "" || s === "n/a" || s === "na" || s === "-" || s === "none") return null;
  var n = parseInt(s.replace(/[^\d]/g,""), 10);
  return isNaN(n) ? null : n;
}

function parseStatus(raw){
  if(!raw)return null;
  var s=String(raw).trim();
  if(/proposed/i.test(s))return "Proposed";
  if(/committed/i.test(s)&&/concept/i.test(s))return "Concept";
  if(/committed/i.test(s))return "Committed";
  if(/backlog/i.test(s))return "Backlogged";
  if(/complete/i.test(s))return "Complete";
  if(/eliminat/i.test(s))return "Eliminated";
  if(/concept/i.test(s))return "Concept";
  return null;
}

function normalizeLiveData(csvText){
  var rows = parseCSV(csvText);
  if(rows.length === 0) throw new Error("CSV appears empty");
  var headerIdx = findHeaderRow(rows);
  var header = rows[headerIdx];
  var body = rows.slice(headerIdx+1);
  var get = makeRowAccessor(header);

  var inits = [];
  body.forEach(function(row){
    var blank = true;
    for(var i=0;i<row.length;i++){ if(row[i] && String(row[i]).trim()){ blank=false; break; } }
    if(blank) return;

    var id   = get(row, "ID");
    var name = get(row, "Initiative Name", "Name");
    if(!id || !name) return;

    var goalRaw = get(row, "5 year Goal", "Goal", "5-year Goal");
    var goalMatch = String(goalRaw).match(/(\d)/);
    var goal = goalMatch ? goalMatch[1] : "";
    if(!GOALS[goal]) return;

    var q3s = get(row, "Q3 2026 Status", "Q3 Status");
    var q2s = get(row, "Q2 2026 Status", "Q2 Status");
    var prev = get(row, "Previous Status (Q4 '25)", "Previous Status", "Q4 2025 Status");
    var q2r = parseRank(get(row, "Q2 '26 Rank", "Q2 2026 Rank"));
    var q3r = parseRank(get(row, "New Q3 '26 Rank", "Q3 '26 Rank", "Q3 2026 Rank"));
    var pt = get(row, "Project Type", "Type");
    var full = get(row, "Initiative Full Description", "Full Description", "Description");
    var short = get(row, "Short Description (for publishing)", "Short Description");
    var owner = get(row, "Obj Owner", "Objective Owner", "Owner");
    var poc = get(row, "POC or PdM", "POC", "PdM");
    var obj = get(row, "26 Obj", "Objective", "Obj");
    var objName = get(row, "Objective Name", "Obj Name");

    var history = [];
    if(prev) history.push({quarter:"Q4 2025", status:parseStatus(prev), raw:prev});
    if(q2s)  history.push({quarter:"Q2 2026", status:parseStatus(q2s),  raw:q2s});
    if(q3s)  history.push({quarter:"Q3 2026", status:parseStatus(q3s),  raw:q3s});

    inits.push({
      id:id, name:name, goal:goal, obj:obj, objName:objName,
      status: parseStatus(q3s) || parseStatus(q2s) || parseStatus(prev),
      history:history, q2Rank:q2r, q3Rank:q3r,
      isNew: /^new\b/i.test(pt),
      fullDesc:full, shortDesc:short||full,
      objOwner:owner, poc:poc,
    });
  });

  if(inits.length === 0) throw new Error("No initiative rows recognized — check column headers");
  return inits;
}

// Parse the Goals reference CSV. Expected to be one row per Objective, with Goal info repeated.
// Returns: { "1": {num, name, desc, owner, objectives: [{obj, name, desc, owners:[...]}]}, ... }
function normalizeGoalsData(csvText){
  var rows = parseCSV(csvText);
  if(rows.length === 0) throw new Error("Goals CSV is empty");
  var headerIdx = 0;
  for(var i = 0; i < Math.min(5, rows.length); i++){
    var normed = rows[i].map(normHeader);
    var hasGoal = normed.some(function(h){return h === "goal" || h === "goal #" || h === "goal number" || h === "g#";});
    if(hasGoal){ headerIdx = i; break; }
  }
  var header = rows[headerIdx];

  // DEBUG: log what column headers we detected in the Goals CSV
  console.log("=== Goals CSV headers detected ===");
  console.log("Header row index:", headerIdx);
  console.log("Raw headers:", header);
  console.log("Normalized headers:", header.map(normHeader));

  var body = rows.slice(headerIdx + 1);
  var get = makeRowAccessor(header);

  var map = {};
  var lastGoalNum = null;  // for fill-down when Goal column is blank
  body.forEach(function(row){
    var blank = true;
    for(var i = 0; i < row.length; i++){ if(row[i] && String(row[i]).trim()){ blank = false; break; } }
    if(blank) return;

    var goalRaw  = get(row, "Goal", "Goal #", "Goal Number", "G#", "5 year Goal");
    var goalMatch = String(goalRaw).match(/(\d)/);
    var goalNum  = goalMatch ? goalMatch[1] : "";

    // Fill-down: if this row has no Goal value but the previous row did, inherit it.
    // Common when sheets list Goal info on the first row of a goal block and leave
    // subsequent objective rows blank in the Goal column.
    if(!goalNum && lastGoalNum) goalNum = lastGoalNum;
    if(!goalNum) return;
    lastGoalNum = goalNum;

    var goalName  = get(row, "Goal Name", "Goal Title");
    var goalDesc  = get(row, "Goal Description", "Goal Desc", "Description");
    var goalOwner = get(row, "Goal Owner", "Goal Owner Name");

    if(!map[goalNum]){
      map[goalNum] = {
        num: goalNum,
        name: goalName,
        desc: goalDesc,
        owner: goalOwner,
        objectives: [],
      };
    } else {
      if(goalName  && !map[goalNum].name)  map[goalNum].name  = goalName;
      if(goalDesc  && !map[goalNum].desc)  map[goalNum].desc  = goalDesc;
      if(goalOwner && !map[goalNum].owner) map[goalNum].owner = goalOwner;
    }

    var obj       = get(row, "Objective", "Obj", "Objective #", "Obj #");
    var objName   = get(row, "Objective Name", "Obj Name");
    var objDesc   = get(row, "Objective Description", "Obj Description", "Obj Desc");
    var objOwner  = get(row, "Objective Owner", "Obj Owner", "Owner");
    if(obj){
      var existing = map[goalNum].objectives.find(function(o){return o.obj === obj;});
      if(existing){
        if(objOwner && existing.owners.indexOf(objOwner) === -1) existing.owners.push(objOwner);
        if(objDesc && !existing.desc) existing.desc = objDesc;
        if(objName && !existing.name) existing.name = objName;
      } else {
        map[goalNum].objectives.push({
          obj: obj, name: objName, desc: objDesc,
          owners: objOwner ? [objOwner] : [],
        });
      }
    }
  });
  return map;
}

// Parse the Capacity Calculations tab.
// Returns: { "1.3.18": { confidenceFactor, confidenceLabel, ciNum, performers,
//            committed, possiblyXS, possiblyS, possiblyM, possiblyL, possiblyXL,
//            noCapacity, notPerforming }, ... }
function normalizeCapacityData(csvText){
  var rows = parseCSV(csvText);
  if(rows.length === 0) throw new Error("Capacity CSV is empty");

  // Find the header row — first row where col 0 normalizes to "id"
  var headerIdx = 0;
  for(var i = 0; i < Math.min(6, rows.length); i++){
    if(rows[i][0] && normHeader(rows[i][0]) === "id"){ headerIdx = i; break; }
  }
  var header = rows[headerIdx];
  var body   = rows.slice(headerIdx + 1);
  var get    = makeRowAccessor(header);

  // The Confidence Index label is in col C (index 2) — not a named header, grab by position
  var map = {};
  body.forEach(function(row){
    var id = get(row, "ID");
    // Only keep rows with a valid dotted initiative ID format
    if(!id || !/^\d+\.\d+/.test(id)) return;

    // Confidence Factor: exported as "90%" or "0.9" — normalise to 0-1 float
    var cfRaw = get(row, "Confidence Factor");
    var cf = 0;
    if(cfRaw.indexOf("%") !== -1){ cf = parseFloat(cfRaw) / 100; }
    else { cf = parseFloat(cfRaw) || 0; }
    if(isNaN(cf)) cf = 0;

    // Confidence Index label lives in col index 2 (column C in the sheet)
    var ciLabel = String(row[2] || "").trim(); // e.g. "Confidence Index: 9"
    var ciMatch = ciLabel.match(/(\d+)/);
    var ciNum   = ciMatch ? parseInt(ciMatch[1], 10) : null;

    function int(key){ return parseInt(get(row, key)) || 0; }

    map[id] = {
      confidenceFactor: cf,
      confidenceLabel:  ciLabel,
      ciNum:            ciNum,
      performers:       int("Performers"),
      committed:        int("Committed"),
      possiblyXS:       int("Possibly - XS"),
      possiblyS:        int("Possibly - S"),
      possiblyM:        int("Possibly - M"),
      possiblyL:        int("Possibly - L"),
      possiblyXL:       int("Possibly - XL"),
      noCapacity:       int("No Capacity Remaining"),
      notPerforming:    int("Not Performing"),
    };
  });

  if(Object.keys(map).length === 0) throw new Error("No capacity rows found — check tab gid");
  return map;
}
function ErrorBoundaryClass(props){
  React.Component.call(this, props);
  this.state = {err: null};
}
ErrorBoundaryClass.prototype = Object.create(React.Component.prototype);
ErrorBoundaryClass.prototype.constructor = ErrorBoundaryClass;
ErrorBoundaryClass.prototype.componentDidCatch = function(err, info){
  console.error("Caught error:", err, info);
  this.setState({err: err});
};
ErrorBoundaryClass.prototype.render = function(){
  if(this.state.err){
    var err = this.state.err;
    var self = this;
    return React.createElement("div", {
      style: {padding:"40px",fontFamily:"monospace",fontSize:12,color:"#C0392B",background:"#FDECEA",margin:"20px",borderRadius:8,border:"1px solid #E6B0AA"}
    },
      React.createElement("div", {style:{fontSize:14,fontWeight:700,marginBottom:10}}, "Something broke rendering this view"),
      React.createElement("div", {style:{marginBottom:10}}, String(err.message || err)),
      React.createElement("div", {style:{fontSize:10,whiteSpace:"pre-wrap",opacity:.7,maxHeight:300,overflow:"auto"}}, err.stack || ""),
      React.createElement("button", {
        onClick: function(){ self.setState({err:null}); },
        style: {marginTop:12,padding:"6px 14px",border:"1px solid #C0392B",borderRadius:6,background:"#fff",color:"#C0392B",cursor:"pointer",fontWeight:600}
      }, "Reset view")
    );
  }
  return this.props.children;
};

// Look up PSI URL by ID. Falls back to a slugified construction if no entry exists,
// which will sometimes be wrong but is better than no link at all.
function buildPsiUrl(init){
  if(PSI_URL_MAP[init.id]) return PSI_URL_MAP[init.id];
  var idPart = String(init.id || "").replace(/\./g, "-");
  var namePart = String(init.name || "")
    .toLowerCase()
    .replace(/[^\w\s-]/g, " ")
    .replace(/[\s_]+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-+|-+$/g, "");
  var slug = namePart ? (idPart + "-" + namePart) : idPart;
  return "https://sites.google.com/nih.gov/aou-project-status-inventory/psi-home/initiatives/" + slug;
}

function MultiSelect(props){
  var label = props.label, options = props.options, selected = props.selected, onChange = props.onChange;
  var oo = useState(false); var isOpen = oo[0], setOpen = oo[1];
  var ref = useRef(null);
  useEffect(function(){
    function h(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", h);
    return function(){ document.removeEventListener("mousedown", h); };
  },[]);
  var all = selected.length === 0;
  function toggle(k){
    if(selected.indexOf(k) === -1) onChange(selected.concat([k]));
    else onChange(selected.filter(function(x){return x!==k;}));
  }
  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={function(){setOpen(!isOpen);}} style={{fontSize:11.5,padding:"5px 11px",border:"1px solid "+(isOpen||!all?"#2471A3":"#dcdcdc"),borderRadius:18,background:isOpen||!all?"#EBF5FB":"#fff",color:isOpen||!all?"#2471A3":"#555",cursor:"pointer",fontWeight:500}}>
        {all?label:label+" ("+selected.length+")"} <span style={{fontSize:8,marginLeft:3,opacity:.6}}>{isOpen?"▲":"▼"}</span>
      </button>
      {isOpen && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:600,background:"#fff",border:"1px solid #dcdcdc",borderRadius:8,boxShadow:"0 6px 18px rgba(0,0,0,.10)",minWidth:180,padding:"4px 0",maxHeight:300,overflowY:"auto"}}>
          <div onClick={function(){onChange([]);setOpen(false);}} style={{fontSize:11.5,padding:"6px 12px",cursor:"pointer",color:all?"#2471A3":"#555",fontWeight:all?600:400,background:all?"#EBF5FB":"transparent"}}>All</div>
          <div style={{height:1,background:"#f0f0f0",margin:"3px 0"}}/>
          {options.map(function(o){
            var on = selected.indexOf(o) !== -1;
            return (
              <div key={o} onClick={function(){toggle(o);}} style={{fontSize:11.5,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,background:on?"#EBF5FB":"transparent",color:on?"#2471A3":"#333"}}>
                <span style={{width:13,height:13,borderRadius:3,border:"1px solid "+(on?"#2471A3":"#ccc"),background:on?"#2471A3":"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff"}}>{on?"✓":""}</span>
                {o}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── Goal Panel ──────────────────────────────────────────────────────────────
function GoalPanel(props){
  var gk = props.goalKey;
  var allInits = props.allInitiatives;
  var goalsRef = props.goalsRef || {};
  if(!gk) return null;
  var g = GOALS[gk];
  if(!g) return null;
  var ref = goalsRef[gk] || {};

  // DEBUG: log what was parsed for this goal so we can diagnose missing descriptions
  console.log("=== Goal "+gk+" parsed from reference ===");
  console.log("Goal name:", ref.name);
  console.log("Goal desc:", ref.desc);
  console.log("Goal owner:", ref.owner);
  console.log("Objectives:", ref.objectives);
  if(ref.objectives){
    ref.objectives.forEach(function(o){
      console.log("  Obj "+o.obj+": name='"+(o.name||"")+"' desc='"+(o.desc||"")+"' owners=["+(o.owners||[]).join(",")+"]");
    });
  }

  // Aggregate per-objective initiative counts and owners from the FULL initiative list
  var goalInits = allInits.filter(function(i){return i.goal === gk;});
  var observedObjMap = {};
  goalInits.forEach(function(i){
    if(!i.obj) return;
    if(!observedObjMap[i.obj]){
      observedObjMap[i.obj] = {obj:i.obj, name:i.objName, ownersFromInits:{}, initCount:0};
    }
    observedObjMap[i.obj].initCount++;
    if(i.objOwner) observedObjMap[i.obj].ownersFromInits[i.objOwner] = true;
  });

  // Build objectives list: prefer the reference as the source of truth (so all objectives
  // appear even if they have zero initiatives this quarter), and merge in any observed
  // objectives that aren't in the reference.
  var refObjMap = {};
  (ref.objectives || []).forEach(function(o){ refObjMap[o.obj] = o; });

  var allObjKeys = {};
  Object.keys(refObjMap).forEach(function(k){ allObjKeys[k] = true; });
  Object.keys(observedObjMap).forEach(function(k){ allObjKeys[k] = true; });

  // Sort objective keys numerically (e.g., 5.1, 5.2, ..., 5.10 in correct order)
  var objectives = Object.keys(allObjKeys).sort(function(a,b){
    var aParts = a.split(".").map(Number);
    var bParts = b.split(".").map(Number);
    for(var i = 0; i < Math.max(aParts.length, bParts.length); i++){
      var av = aParts[i] || 0, bv = bParts[i] || 0;
      if(av !== bv) return av - bv;
    }
    return 0;
  }).map(function(k){
    var obs = observedObjMap[k];
    var rf  = refObjMap[k];
    var owners = {};
    if(rf && rf.owners) rf.owners.forEach(function(o){ owners[o] = true; });
    if(obs) Object.keys(obs.ownersFromInits).forEach(function(o){ owners[o] = true; });
    return {
      obj: k,
      name: (rf && rf.name) || (obs && obs.name) || "",
      desc: rf ? rf.desc : "",
      owners: Object.keys(owners),
      initCount: obs ? obs.initCount : 0,
      hasReference: !!rf,
    };
  });

  return (
    <div style={{position:"fixed",top:0,right:0,bottom:0,width:"440px",maxWidth:"42vw",background:"#fff",borderLeft:"1px solid #ececec",boxShadow:"-4px 0 16px rgba(0,0,0,.08)",zIndex:props.zIndex || 1000,display:"flex",flexDirection:"column"}}>

            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:g.color,fontWeight:700,marginBottom:4}}>Strategic Goal {g.num}</div>

          <button onClick={props.onClose} style={{border:"none",background:"none",fontSize:22,color:"#bbb",cursor:"pointer",padding:0,lineHeight:1}}>×</button>
        </div>
        <div style={{fontSize:11,color:"#888",marginTop:6}}>{goalInits.length} initiative{goalInits.length !== 1 ? "s" : ""} in this quarter · {objectives.length} objective{objectives.length !== 1 ? "s" : ""}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 20px"}}>

        <div style={{marginBottom:14,padding:"10px 12px",borderRadius:6,background:"#fff",border:"1px solid #ececec"}}>
          <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600,marginBottom:6}}>Goal description</div>
          {ref.desc ? (

        <div style={{marginBottom:14,padding:"10px 12px",borderRadius:6,background:"#fff",border:"1px solid #ececec"}}>
          <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600,marginBottom:6}}>Goal Owner</div>
          {ref.owner ? (
            <div style={{fontSize:12,color:"#444",fontWeight:500}}>{ref.owner}</div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600,marginBottom:8}}>Objectives & owners</div>
          {objectives.length === 0 ? (
            <div style={{fontSize:11.5,color:"#bbb",fontStyle:"italic",padding:"8px 12px"}}>No objectives found.</div>
          ) : (
            objectives.map(function(o){
              return (
                <div key={o.obj} style={{padding:"10px 12px",marginBottom:6,borderRadius:6,background:"#fff",border:"1px solid #ececec",borderLeft:"3px solid "+g.color}}>
                  <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:8,marginBottom:4}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#222"}}>Objective {o.obj}{o.name ? ": "+o.name : ""}</div>
                    <div style={{fontSize:10,color:o.initCount > 0 ? "#999" : "#ccc",flexShrink:0}}>{o.initCount} init</div>
                  </div>
                  {o.desc && (
                    <div style={{fontSize:11,color:"#666",marginTop:4,marginBottom:6,lineHeight:1.45}}>{o.desc}</div>
                  )}
                  <div style={{fontSize:10.5,color:"#666"}}>
                    <span style={{color:"#aaa"}}>Owner{o.owners.length !== 1 ? "s" : ""}: </span>
                    {o.owners.length > 0 ? o.owners.join(", ") : <span style={{color:"#bbb",fontStyle:"italic"}}>none assigned</span>}
                  </div>
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Main unified page ───────────────────────────────────────────────────────
function MainView(props){
  var initiatives = props.initiatives, onDrill = props.onDrill, onGoalDrill = props.onGoalDrill, goalFocus = props.goalFocus;
  var goalsRef = props.goalsRef || {};
  var displayQuarter = "Q3 2026";

  var ranked = initiatives.filter(function(i){return i.q3Rank != null;}).sort(function(a,b){return a.q3Rank - b.q3Rank;});
  var top3 = ranked.slice(0,3);
  var newOnes = initiatives.filter(function(i){return i.isNew;});

  // Briefing status mix: Backlogged · Proposed (new) · Proposed (ongoing)
  var briefingMix = useMemo(function(){
    var buckets = {
      "Backlogged":         {n:0, color:STATUS_CFG.Backlogged.dot},
      "Proposed (new)":     {n:0, color:"#F4D03F"},
      "Proposed (ongoing)": {n:0, color:STATUS_CFG.Proposed.dot},
    };
    initiatives.forEach(function(i){
      if(i.status === "Backlogged"){ buckets["Backlogged"].n++; return; }
      if(i.status === "Proposed" && i.isNew){ buckets["Proposed (new)"].n++; return; }
      if(i.status === "Proposed"){ buckets["Proposed (ongoing)"].n++; return; }
    });
    return buckets;
  },[initiatives]);

  // Changes computation (Q2 2026 → Q3 2026, fixed for now since it's the planning cycle)
  var fromQ = "Q2 2026", toQ = "Q3 2026";
  function rankFor(i, q){
    if(q === "Q2 2026") return i.q2Rank;
    if(q === "Q3 2026") return i.q3Rank;
    return null;
  }
  var changes = useMemo(function(){
    var added=[], removed=[], statusChanged=[], unchanged=[];
    initiatives.forEach(function(i){
      var fH = i.history.find(function(h){return h.quarter === fromQ;});
      var tH = i.history.find(function(h){return h.quarter === toQ;});
      var fS = fH ? fH.status : null;
      var tS = tH ? tH.status : null;
      if(!fH && tH){ added.push({init:i, fromS:null, toS:tS}); return; }
      if(fH && !tH){ removed.push({init:i, fromS:fS, toS:null}); return; }
      if(fS !== tS){ statusChanged.push({init:i, fromS:fS, toS:tS}); return; }
      unchanged.push({init:i});
    });
    var promotions  = statusChanged.filter(function(c){return c.fromS === "Proposed" && c.toS === "Committed";});
    var demotions   = statusChanged.filter(function(c){return (c.fromS === "Committed" || c.fromS === "Proposed") && (c.toS === "Backlogged" || c.toS === "Eliminated");});
    var completions = statusChanged.filter(function(c){return c.toS === "Complete";});
    var revivals    = statusChanged.filter(function(c){return c.fromS === "Backlogged" && c.toS !== "Backlogged";});
    var concepts    = statusChanged.filter(function(c){return c.fromS === "Concept";});
    var otherStatus = statusChanged.filter(function(c){
      return promotions.indexOf(c) === -1 && demotions.indexOf(c) === -1 && completions.indexOf(c) === -1 && revivals.indexOf(c) === -1 && concepts.indexOf(c) === -1;
    });
    return {added:added,removed:removed,promotions:promotions,demotions:demotions,completions:completions,revivals:revivals,otherStatus:otherStatus,unchanged:unchanged};
  },[initiatives]);

  // Reframed change buckets: tell the story of "what happened to last quarter's commitments,
  // plus what's newly proposed on top." This makes the math provable: completed + backlogged
  // + ongoing should equal Q2 Committed total; adding new gives the current candidate total.
  var cycleStory = useMemo(function(){
    var lastCommittedIds = {};
    var lastBackloggedIds = {};
    initiatives.forEach(function(i){
      var q2H = i.history.find(function(h){return h.quarter === "Q2 2026";});
      if(q2H && q2H.status === "Committed") lastCommittedIds[i.id] = true;
      if(q2H && q2H.status === "Backlogged") lastBackloggedIds[i.id] = true;
    });
    var lastCommitted = Object.keys(lastCommittedIds);

    var completed = initiatives.filter(function(i){
      return lastCommittedIds[i.id] && i.status === "Complete";
    });
    var backlogged = initiatives.filter(function(i){
      return lastCommittedIds[i.id] && i.status === "Backlogged";
    });
    var ongoing = initiatives.filter(function(i){
      return lastCommittedIds[i.id] && (i.status === "Proposed" || i.status === "Committed") && !i.isNew;
    });
    var newProposed = initiatives.filter(function(i){
      // True "new this cycle": flagged NEW in sheet AND no prior-quarter history.
      // (Without the history check, items flagged NEW but carried from a prior cycle inflate the count.)
      if(!i.isNew) return false;
      if(i.status !== "Proposed") return false;
      var hadPriorHistory = i.history.some(function(h){return h.quarter !== "Q3 2026" && h.status;});
      return !hadPriorHistory;
    });
    // Revived: was Backlogged last cycle, now Proposed or Committed this cycle
    var revived = initiatives.filter(function(i){
      return lastBackloggedIds[i.id] && (i.status === "Proposed" || i.status === "Committed");
    });

    return {
      lastCommittedTotal: lastCommitted.length,
      completed: completed,
      backlogged: backlogged,
      ongoing: ongoing,
      newProposed: newProposed,
      revived: revived,
    };
  },[initiatives]);

  // Goal lanes
  var goalLanes = {};
  Object.keys(GOALS).forEach(function(k){ goalLanes[k] = []; });
  initiatives.forEach(function(i){ if(goalLanes[i.goal]) goalLanes[i.goal].push(i); });
  // Numeric ID sort: splits "2.2.10" into [2,2,10] and compares segment by segment
  function compareIds(a, b){
    var ap = String(a.id || "").split(".").map(Number);
    var bp = String(b.id || "").split(".").map(Number);
    for(var i = 0; i < Math.max(ap.length, bp.length); i++){
      var av = ap[i] || 0, bv = bp[i] || 0;
      if(av !== bv) return av - bv;
    }
    return 0;
  }

  Object.keys(goalLanes).forEach(function(k){
    goalLanes[k].sort(function(a, b){ return compareIds(a, b); });
  });

  return (
    <div style={{padding:"20px 28px 32px"}}>

      {/* === Combined top row: snapshot + change tiles side-by-side === */}
      <section id="qpe-section-summary">
        <div style={{display:"flex",gap:10,marginBottom:24,flexWrap:"wrap",alignItems:"stretch"}}>

        {/* Snapshot block — split into Last Cycle Outcomes (retrospective) + This Cycle (active) */}
        <div style={{display:"flex",gap:8,flex:"1 1 320px",minWidth:280}}>

          {/* Last cycle — muted, smaller, retrospective */}
          <div className="card" style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:4,flex:"0 1 160px",background:"#fafbfc",borderColor:"#ececec"}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600}}>← Last cycle outcomes</div>
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <div>
                <div style={{fontSize:9.5,color:"#999"}}>Completed</div>
                <div style={{fontSize:16,fontWeight:700,color:"#1E8449",lineHeight:1.1}}>{cycleStory.completed.length}</div>
              </div>
              <div>
                <div style={{fontSize:9.5,color:"#999"}}>Backlogged</div>
                <div style={{fontSize:16,fontWeight:700,color:STATUS_CFG.Backlogged.tx,lineHeight:1.1}}>{cycleStory.backlogged.length}</div>
              </div>
            </div>
            <div style={{fontSize:9.5,color:"#aaa",marginTop:"auto",paddingTop:4}}>of {cycleStory.lastCommittedTotal} committed</div>
          </div>

          {/* This cycle — primary, larger, the focus */}
          <div className="card" style={{padding:"10px 14px 12px",display:"flex",flexDirection:"column",gap:6,flex:"1 1 200px"}}>
            <div className="card-hover" onClick={function(){props.onListDrill({
              label:"In "+displayQuarter+" planning",
              items: cycleStory.ongoing.concat(cycleStory.newProposed).concat(cycleStory.revived),
              sublabel: cycleStory.ongoing.length+" ongoing + "+cycleStory.newProposed.length+" new"+(cycleStory.revived.length ? " + "+cycleStory.revived.length+" revived" : ""),
              accent:"#666",
            });}} style={{cursor:"pointer",margin:"-4px -6px",padding:"4px 6px",borderRadius:5}}>
              <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#2471A3",fontWeight:600}}>→ In {displayQuarter} planning</div>
              <div style={{fontSize:24,fontWeight:700,lineHeight:1.1,marginTop:2,color:"#111"}}>{cycleStory.ongoing.length + cycleStory.newProposed.length + cycleStory.revived.length}</div>
              <div style={{fontSize:10,color:"#666",marginTop:1}}>{cycleStory.ongoing.length} ongoing + {cycleStory.newProposed.length} new{cycleStory.revived.length ? " + "+cycleStory.revived.length+" revived" : ""}</div>
            </div>
            <div style={{marginTop:2}}>
              <div style={{display:"flex",height:16,borderRadius:3,overflow:"hidden",border:"1px solid #ececec"}}>
                {[
                  {k:"Ongoing",    n:cycleStory.ongoing.length,    color:STATUS_CFG.Proposed.dot},
                  {k:"New",        n:cycleStory.newProposed.length,color:"#F4D03F"},
                  {k:"Revived",    n:cycleStory.revived.length,    color:"#6C3483"},
                ].map(function(seg){
                  if(seg.n === 0) return null;
                  return <div key={seg.k} style={{flexGrow:seg.n,background:seg.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9.5,color:"#fff",fontWeight:600}}>{seg.n}</div>;
                })}
              </div>
              <div style={{display:"flex",gap:8,marginTop:4,fontSize:9.5,color:"#666",flexWrap:"wrap"}}>
                {[
                  {k:"Ongoing",    n:cycleStory.ongoing.length,    color:STATUS_CFG.Proposed.dot},
                  {k:"New",        n:cycleStory.newProposed.length,color:"#F4D03F"},
                  {k:"Revived",    n:cycleStory.revived.length,    color:"#6C3483"},
                ].map(function(seg){
                  if(seg.n === 0) return null;
                  return <span key={seg.k} style={{display:"inline-flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:2,background:seg.color}}/>{seg.k}</span>;
                })}
              </div>
            </div>
          </div>
        </div>

        {/* Change tiles — grouped: last cycle outcomes (muted) | this cycle candidates (active) */}
        <div style={{display:"flex",gap:6,flex:"2 1 540px",flexWrap:"wrap",alignItems:"stretch"}}>

          {/* Last cycle group */}
          <div className="card card-hover" onClick={function(){props.onListDrill({
            label:"✓ Completed",
            items: cycleStory.completed,
            sublabel:"of "+cycleStory.lastCommittedTotal+" committed last cycle",
            accent:"#117A65",
          });}} style={{padding:"8px 12px",flex:"1 1 110px",display:"flex",flexDirection:"column",gap:1,justifyContent:"center",cursor:"pointer",background:"#fafbfc"}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:"#999",fontWeight:600}}>✓ Completed</div>
            <div style={{fontSize:18,fontWeight:700,color:"#117A65",lineHeight:1.1}}>{cycleStory.completed.length}</div>
            <div style={{fontSize:9.5,color:"#aaa"}}>last cycle</div>
          </div>
          <div className="card card-hover" onClick={function(){props.onListDrill({
            label:"↓ Backlogged",
            items: cycleStory.backlogged,
            sublabel:"of "+cycleStory.lastCommittedTotal+" committed last cycle",
            accent:"#7D6608",
          });}} style={{padding:"8px 12px",flex:"1 1 110px",display:"flex",flexDirection:"column",gap:1,justifyContent:"center",cursor:"pointer",background:"#fafbfc"}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:"#999",fontWeight:600}}>↓ Backlogged</div>
            <div style={{fontSize:18,fontWeight:700,color:"#7D6608",lineHeight:1.1}}>{cycleStory.backlogged.length}</div>
            <div style={{fontSize:9.5,color:"#aaa"}}>last cycle</div>
          </div>

          {/* Visible divider */}
          <div style={{width:1,background:"#ddd",margin:"4px 4px",flexShrink:0}}/>

          {/* This cycle group */}
          <div className="card card-hover" onClick={function(){props.onListDrill({
            label:"↻ Ongoing",
            items: cycleStory.ongoing,
            sublabel:"carried forward from last cycle",
            accent:"#7D6608",
          });}} style={{padding:"8px 12px",flex:"1 1 110px",display:"flex",flexDirection:"column",gap:1,justifyContent:"center",cursor:"pointer"}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:"#999",fontWeight:600}}>↻ Ongoing</div>
            <div style={{fontSize:18,fontWeight:700,color:"#7D6608",lineHeight:1.1}}>{cycleStory.ongoing.length}</div>
            <div style={{fontSize:9.5,color:"#aaa"}}>this cycle</div>
          </div>
          <div className="card card-hover" onClick={function(){props.onListDrill({
            label:"+ New Proposed",
            items: cycleStory.newProposed,
            sublabel:"added this cycle",
            accent:"#9A6800",
          });}} style={{padding:"8px 12px",flex:"1 1 110px",display:"flex",flexDirection:"column",gap:1,justifyContent:"center",background:"#FEF5E7",borderColor:"#F4D03F",cursor:"pointer"}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:"#9A6800",fontWeight:600}}>+ New Proposed</div>
            <div style={{fontSize:18,fontWeight:700,color:"#9A6800",lineHeight:1.1}}>{cycleStory.newProposed.length}</div>
            <div style={{fontSize:9.5,color:"#9A6800"}}>this cycle</div>
          </div>
          <div className="card card-hover" onClick={function(){props.onListDrill({
            label:"↻ Revived from Backlog",
            items: cycleStory.revived,
            sublabel:"pulled back to active",
            accent:"#6C3483",
          });}} style={{padding:"8px 12px",flex:"1 1 110px",display:"flex",flexDirection:"column",gap:1,justifyContent:"center",cursor:"pointer"}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:"#999",fontWeight:600}}>↻ Revived</div>
            <div style={{fontSize:18,fontWeight:700,color:"#6C3483",lineHeight:1.1}}>{cycleStory.revived.length}</div>
            <div style={{fontSize:9.5,color:"#aaa"}}>this cycle</div>
          </div>
        </div>
      </div>
      </section>

      {/* === Section 3: CEO / Top-ranked === */}
      {top3.length > 0 && (
        <section id="qpe-section-topranked" style={{marginBottom:24}}>
          <div className="section-h" style={{color:"#9A6800"}}>
            <span>★ Top-ranked for {displayQuarter}</span>
            <span className="rule" style={{background:"#F4D03F"}}/>
            <span style={{fontSize:10,color:"#aaa",letterSpacing:0,fontWeight:400,textTransform:"none"}}>(Goal Owner Ranking)</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))",gap:12}}>
            {top3.map(function(t){
              var g = GOALS[t.goal];
              var summary = (t.shortDesc || "").slice(0, 120);
              return (
                <div key={t.id} className="card card-hover" onClick={function(){onDrill(t.id);}} style={{padding:"14px 16px",position:"relative"}}>
                  <div style={{position:"absolute",top:10,right:14,fontSize:30,fontWeight:800,color:"#F4D03F",lineHeight:1,opacity:.4}}>#{t.q3Rank}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                    <Chip bg={g.color+"22"} tx={g.color}>G{g.num}</Chip>
                    <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:1,color:"#9A6800",fontWeight:700}}>★ Rank #{t.q3Rank}</span>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:"#1a1a1a",lineHeight:1.3,marginBottom:8,paddingRight:30}}>{t.name}</div>
                  <div style={{fontSize:11,color:"#666",marginBottom:10,lineHeight:1.45}}>{summary}{(t.shortDesc||"").length > 120 ? "…" : ""}</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                    {t.status && <StatusChip s={t.status}/>}
                    {t.isNew && <NewBadge/>}
                    <span style={{fontSize:10.5,color:"#999",marginLeft:"auto"}}>{t.objOwner}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      )}

      {/* === Section 4: New proposals (now 2-column card grid) === */}
      {newOnes.length > 0 && (
        <section id="qpe-section-newproposed" style={{marginBottom:24}}>
          <div className="section-h" style={{color:"#9A6800"}}>
            <span>📥 New Proposed Initiatives This Cycle</span>
            <span className="rule" style={{background:"#F4D03F"}}/>
            <span style={{fontSize:10,color:"#aaa",letterSpacing:0,fontWeight:400,textTransform:"none"}}>({newOnes.length})</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(320px, 1fr))",gap:10}}>
            {newOnes.map(function(n){
              return <InitCard key={n.id} init={n} onDrill={onDrill}/>;
            })}
          </div>
        </section>
      )}

      {/* === Section 5: Goal lanes — Initiatives by Goal, fixed 3x2 grid === */}
      <section id="qpe-section-goallanes" style={{marginBottom:24}}>
        <div className="section-h">
          <span>Initiatives by Goal — {displayQuarter}</span>
          <span className="rule"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3, minmax(0, 1fr))",gap:12}}>
          {Object.keys(GOALS).filter(function(k){return goalFocus === "all" || goalFocus === k;}).map(function(k){
            var g = GOALS[k];
            var lane = goalLanes[k];
            var goalOwner = goalsRef[k] && goalsRef[k].owner;
            return (
              <div key={k} className="card" style={{padding:"12px 14px"}}>
                <div onClick={function(){onGoalDrill(k);}} style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8,gap:6,borderBottom:"2px solid "+g.color+"33",paddingBottom:6,cursor:"pointer"}} title="Click to see goal details, objectives, and owners">
                  <div style={{display:"flex",alignItems:"baseline",gap:8,minWidth:0,flex:1}}>
                    <span style={{fontSize:13,fontWeight:700,color:g.color,whiteSpace:"nowrap"}}>Goal {g.num}: {g.name}</span>
                    {goalOwner && <span style={{fontSize:10.5,color:"#999",fontWeight:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>· {goalOwner}</span>}
                  </div>
                  <span style={{fontSize:10.5,color:"#999",flexShrink:0}}>{lane.length}</span>
                </div>
                {lane.length === 0 ? (
                  <div style={{fontSize:11,color:"#bbb",fontStyle:"italic",padding:"6px 0"}}>None in this quarter.</div>
                ) : (
                  <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    {lane.map(function(i){
                      return (
                        <div key={i.id} className="row-hover" onClick={function(){onDrill(i.id);}} style={{padding:"6px 8px",margin:"0 -8px",borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",gap:6,minWidth:0}}>
                          <span style={{fontSize:12,color:"#333",flex:1,minWidth:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={i.name}>{i.name} <span style={{fontFamily:"monospace",fontSize:9.5,color:"#aaa",fontWeight:400}}>{i.id}</span></span>
                          {i.isNew && <NewBadge size={8.5}/>}
                          {i.status === "Backlogged" && <Chip bg={STATUS_CFG.Backlogged.bg} tx={STATUS_CFG.Backlogged.tx} size={8.5}>Backlogged</Chip>}
                          {i.status === "Complete" && <Chip bg={STATUS_CFG.Complete.bg} tx={STATUS_CFG.Complete.tx} size={8.5}>Completed</Chip>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </section>

    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App(){
  var gf = useState("all"); var goalFocus = gf[0], setGoalFocus = gf[1];
  var fs = useState([]); var fStatus = fs[0], setFStatus = fs[1];
  var fo = useState([]); var fOwner = fo[0], setFOwner = fo[1];
  var no = useState(false); var newOnly = no[0], setNewOnly = no[1];
  var sr = useState(""); var search = sr[0], setSearch = sr[1];
  var dr = useState(null); var drill = dr[0], setDrillRaw = dr[1];
  var gd = useState(null); var goalDrill = gd[0], setGoalDrillRaw = gd[1];
  var ld = useState(null); var listDrill = ld[0], setListDrillRaw = ld[1];
  // Track which panel was opened most recently so we can stack z-index correctly
  var lp = useState(null); var lastPanel = lp[0], setLastPanel = lp[1];

  function setDrill(v){ setDrillRaw(v); if(v) setLastPanel("drill"); }
  function setGoalDrill(v){ setGoalDrillRaw(v); if(v) setLastPanel("goal"); }
  function setListDrill(v){ setListDrillRaw(v); if(v) setLastPanel("list"); }

  // Presentation mode: ?present=1 hides chrome and bumps font sizes for projection / screenshots
  var presentMode = useMemo(function(){
    try {
      var params = new URLSearchParams(window.location.search || "");
      return params.get("present") === "1";
    } catch(e){ return false; }
  },[]);

  var ist = useState([]); var initiatives = ist[0], setInitiatives = ist[1];
  var gref = useState({}); var goalsRef = gref[0], setGoalsRef = gref[1];
  var cref = useState({}); var capRef = cref[0], setCapRef = cref[1];
  var ls = useState("loading"); var loadState = ls[0], setLoadState = ls[1];
  var le = useState(""); var loadError = le[0], setLoadError = le[1];
  var la = useState(null); var loadedAt = la[0], setLoadedAt = la[1];

  function loadLive(){
    setLoadState("loading");
    setLoadError("");

    var initsPromise = fetch(addCacheBuster(LIVE_CSV_URL), {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status+" from initiatives sheet"); return r.text(); })
      .then(function(txt){
        if(txt.toLowerCase().indexOf("<html") > -1) throw new Error("Initiatives sheet returned HTML");
        return normalizeLiveData(txt);
      });

    var goalsPromise = fetch(addCacheBuster(GOALS_CSV_URL), {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status+" from goals sheet"); return r.text(); })
      .then(function(txt){
        if(txt.toLowerCase().indexOf("<html") > -1) throw new Error("Goals sheet returned HTML");
        return normalizeGoalsData(txt);
      })
      .catch(function(err){ console.warn("Goals load failed:", err.message); return {}; });

    var capPromise = fetch(addCacheBuster(CAPACITY_CSV_URL), {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status+" from capacity sheet"); return r.text(); })
      .then(function(txt){
        if(txt.toLowerCase().indexOf("<html") > -1) throw new Error("Capacity sheet returned HTML");
        return normalizeCapacityData(txt);
      })
      .catch(function(err){ console.warn("Capacity load failed (non-blocking):", err.message); return {}; });

    Promise.all([initsPromise, goalsPromise, capPromise])
      .then(function(results){
        setInitiatives(results[0]);
        setGoalsRef(results[1]);
        setCapRef(results[2]);
        setLoadState("live");
        setLoadedAt(new Date());
      })
      .catch(function(err){
        console.warn("Live load failed:", err);
        setLoadError(err.message || String(err));
        setInitiatives([]);
        setLoadState("error");
        setLoadedAt(new Date());
      });
  }

  useEffect(function(){ loadLive(); }, []);

  var filtered = useMemo(function(){
    return initiatives.filter(function(i){
      if(goalFocus !== "all" && i.goal !== goalFocus) return false;
      if(fStatus.length && fStatus.indexOf(i.status) === -1) return false;
      if(newOnly && !i.isNew) return false;
      if(search){
        var q = search.toLowerCase();
        if(i.name.toLowerCase().indexOf(q) === -1 && i.id.toLowerCase().indexOf(q) === -1 && (i.objOwner||"").toLowerCase().indexOf(q) === -1) return false;
      }
      return true;
    });
  },[initiatives, goalFocus, fStatus, newOnly, search]);

  var allOwners = useMemo(function(){
    var s = {};
    initiatives.forEach(function(i){ if(i.objOwner) s[i.objOwner] = true; });
    return Object.keys(s).sort();
  },[initiatives]);

  var availableStatuses = useMemo(function(){
    return STATUS_KEYS.filter(function(s){
      return initiatives.some(function(i){return i.status === s;});
    });
  },[initiatives]);

  var drillInit = drill ? initiatives.find(function(x){return x.id === drill;}) : null;
  var anyFilter = goalFocus !== "all" || fStatus.length || newOnly || search;
  function clearAll(){ setGoalFocus("all"); setFStatus([]); setNewOnly(false); setSearch(""); }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",fontSize:presentMode?"15.5px":"14px"}}>
      <div style={{padding:"12px 28px",background:"#fff",borderBottom:"1px solid #ececec",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:1.4,color:"#bbb",fontWeight:600,marginBottom:3}}>NIH · <em>All of Us</em> Research Program · Q3 2026 Planning</div>
          <div style={{fontSize:18,fontWeight:700,color:"#111"}}>Quarterly Planning Dashboard</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {!presentMode && (
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#999"}}>{filtered.length} of {initiatives.length} initiatives</div>
              <div style={{fontSize:10,marginTop:2}}>
                {loadState === "loading" && <span style={{color:"#2471A3"}}>↻ loading…</span>}
                {loadState === "live" && <span style={{color:"#1E8449"}}>● live · loaded {loadedAt ? loadedAt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}) : ""}</span>}
                {loadState === "error" && <span style={{color:"#C0392B"}} title={loadError}>● load failed: {loadError}</span>}
              </div>
            </div>
          )}
          {!presentMode && <button onClick={loadLive} disabled={loadState === "loading"} style={{fontSize:11.5,padding:"6px 12px",border:"1px solid #C8DCF0",borderRadius:6,background:"#EBF5FB",color:"#2471A3",cursor:loadState === "loading" ? "wait" : "pointer",fontWeight:500}}>{loadState === "loading" ? "…" : "↻ Refresh"}</button>}
          {presentMode && <span style={{fontSize:11,color:"#999",fontStyle:"italic"}}>presentation mode</span>}
        </div>
      </div>

      {!presentMode && (
        <div style={{padding:"10px 28px",background:"#fafafa",borderBottom:"1px solid #ececec",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
          <span style={{fontSize:10,textTransform:"uppercase",color:"#aaa",fontWeight:600}}>Focus</span>
          <select value={goalFocus} onChange={function(e){setGoalFocus(e.target.value);}} style={{fontSize:11.5,padding:"5px 10px",border:"1px solid "+(goalFocus !== "all" ? "#2471A3" : "#dcdcdc"),borderRadius:18,background:goalFocus !== "all" ? "#EBF5FB" : "#fff",color:goalFocus !== "all" ? "#2471A3" : "#555",fontWeight:goalFocus !== "all" ? 600 : 400}}>
            <option value="all">All Goals</option>
            {Object.keys(GOALS).map(function(k){var g = GOALS[k]; return <option key={k} value={k}>Goal {g.num}: {g.name}</option>;})}
          </select>
          <MultiSelect label="Status" options={availableStatuses} selected={fStatus} onChange={setFStatus}/>
          <button onClick={function(){setNewOnly(!newOnly);}} style={{fontSize:11.5,padding:"5px 11px",border:"1px solid "+(newOnly ? "#9A6800" : "#dcdcdc"),borderRadius:18,background:newOnly ? "#FEF5E7" : "#fff",color:newOnly ? "#9A6800" : "#555",cursor:"pointer",fontWeight:newOnly ? 600 : 400}}>📥 New only</button>
          {anyFilter ? <button onClick={clearAll} style={{fontSize:11.5,background:"none",border:"none",color:"#C0392B",cursor:"pointer",fontWeight:500}}>✕ Clear</button> : null}
          <div style={{flex:1}}/>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="🔍 Search…" style={{fontSize:12,padding:"5px 11px",border:"1px solid #dcdcdc",borderRadius:18,width:200}}/>
        </div>
      )}

      <div style={{flex:1,overflow:"auto"}}>
        {loadState === "loading" && (
          <div style={{padding:"60px",textAlign:"center",color:"#999"}}>Loading initiatives from sheet…</div>
        )}
        {loadState === "error" && (
          <div style={{padding:"40px",margin:"20px",background:"#FDECEA",border:"1px solid #E6B0AA",borderRadius:8,color:"#7B241C"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>Could not load data from sheet</div>
            <div style={{fontSize:12,marginBottom:12}}>{loadError}</div>
            <button onClick={loadLive} style={{marginTop:12,padding:"6px 14px",border:"1px solid #C0392B",background:"#fff",color:"#C0392B",borderRadius:6,cursor:"pointer",fontWeight:600}}>Retry</button>
          </div>
        )}
        {loadState === "live" && (
          <MainView initiatives={filtered} onDrill={setDrill} onGoalDrill={setGoalDrill} onListDrill={setListDrill} goalFocus={goalFocus} goalsRef={goalsRef}/>
        )}
      </div>

      {drillInit && <DrillPanel init={drillInit} capRef={capRef} zIndex={lastPanel === "drill" ? 1100 : 1000} onClose={function(){setDrillRaw(null);}}/>}
      {goalDrill && <GoalPanel goalKey={goalDrill} allInitiatives={initiatives} goalsRef={goalsRef} zIndex={lastPanel === "goal" ? 1100 : 1000} onClose={function(){setGoalDrillRaw(null);}}/>}
      {listDrill && <ListPanel list={listDrill} label={listDrill.label} sublabel={listDrill.sublabel} accent={listDrill.accent} zIndex={lastPanel === "list" ? 1100 : 1000} onItemDrill={function(id){setListDrillRaw(null);setDrill(id);}} onClose={function(){setListDrillRaw(null);}}/>}
    </div>
  );
}

var rootEl = document.getElementById("root");
var root = ReactDOM.createRoot(rootEl);
var boundary = React.createElement(ErrorBoundaryClass, null, React.createElement(App, null));
root.render(boundary);

</script>
</body>
</html>
